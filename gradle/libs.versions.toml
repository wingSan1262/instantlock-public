[versions]
agp = "8.5.1" # latest stable as of Jan 2026
kotlin = "2.1.0" # updated to match kotlin-stdlib dependency
composeCompiler = "2.1.0" # Compose Compiler plugin for Kotlin 2.1.0
coreKtx = "1.13.1" # latest stable
junit = "4.13.2"
junitVersion = "1.1.5"
espressoCore = "3.5.1"
lifecycleRuntimeKtx = "2.7.0" # already latest
activityCompose = "1.9.0" # latest stable
composeBom = "2024.01.00" # latest stable
constraintlayout = "2.2.0-alpha13" # latest alpha, or use 2.1.4 for stable
cardview = "1.0.0"
navigationRuntimeKtx = "2.8.3"
