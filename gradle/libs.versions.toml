litertSupportApi = "2.11.0"
tensorflowLite = "2.17.0"
tensorflowLiteSupport = "0.5.0"
gmsAds = "24.9.0"
gson = "2.13.2"
coil = "2.7.0"
material = "1.13.0"
mlkitPoseDetection = "18.0.0-beta5"
mlkitPoseDetectionAccurate = "18.0.0-beta5"
litert = "1.4.0"
kotlinxCoroutinesPlayServices = "1.7.3"

[libraries]
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
